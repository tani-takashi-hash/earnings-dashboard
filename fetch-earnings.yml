name: 決算データ取得 → GitHub Pages配信

on:
  schedule:
    - cron: '0 21 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Fetch earnings from kabuyoho
        run: |
          python3 - << 'PYEOF'
          import requests, json, datetime, re
          from pathlib import Path
          from bs4 import BeautifulSoup

          HEADERS = {
              "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
              "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,*/*;q=0.8",
              "Accept-Language": "ja,en-US;q=0.9,en;q=0.8",
              "Referer": "https://kabuyoho.jp/",
          }
          HOL = {"2026-01-01","2026-01-12","2026-02-11","2026-02-23","2026-03-20","2026-04-29","2026-05-03","2026-05-04","2026-05-05","2026-05-06","2026-07-20","2026-08-11","2026-09-21","2026-09-23","2026-10-12","2026-11-03","2026-11-23"}

          def is_biz(d):
              return d.weekday() < 5 and d.isoformat() not in HOL

          def scrape(date_str, session):
              url = f"https://kabuyoho.jp/calender?report_date={date_str.replace('-','')}"
              try:
                  r = session.get(url, headers=HEADERS, timeout=20)
                  r.raise_for_status()
              except Exception as e:
                  print(f"  {date_str}: 失敗 {e}")
                  return []
              soup = BeautifulSoup(r.text, "lxml")
              results = []
              seen = set()
              # リンクから銘柄コードを抽出
              for a in soup.find_all("a", href=re.compile(r'bcode=(\d{4,5})')):
                  m = re.search(r'bcode=(\d{4,5})', a["href"])
                  if not m: continue
                  code = int(m.group(1))
                  if code in seen: continue
                  seen.add(code)
                  name = a.get_text(strip=True)[:30]
                  if not name: continue
                  # 親要素から市場・時刻を取得
                  tr = a.find_parent("tr")
                  market = ""
                  timing = "本引後"
                  sector = ""
                  if tr:
                      cells = tr.find_all("td")
                      for cell in cells:
                          t = cell.get_text(strip=True)
                          if any(x in t for x in ["東P","東S","東G","名証","札証"]):
                              market = t[:10]
                          if any(x in t for x in ["本引後","引前","引後","15:00","16:00"]):
                              timing = t[:10]
                  results.append({
                      "date": date_str, "code": code, "name": name,
                      "market": market, "q": "", "time": timing, "sector": sector,
                  })
              print(f"  {date_str}: {len(results)}件")
              return results

          today = datetime.date.today()
          session = requests.Session()
          all_e = []

          import time
          for i in range(21):
              d = today + datetime.timedelta(days=i)
              if not is_biz(d): continue
              items = scrape(d.isoformat(), session)
              all_e.extend(items)
              time.sleep(2)

          all_e.sort(key=lambda x: (x["date"], x["code"]))
          seen = set()
          unique = [e for e in all_e if (e["date"],e["code"]) not in seen and not seen.add((e["date"],e["code"]))]

          out = {
              "generated_at": datetime.datetime.now(datetime.timezone(datetime.timedelta(hours=9))).isoformat(),
              "source": "kabuyoho.jp",
              "total": len(unique),
              "earnings": unique,
          }
          Path("docs").mkdir(exist_ok=True)
          Path("docs/earnings.json").write_text(json.dumps(out, ensure_ascii=False, indent=2), encoding="utf-8")
          print(f"\n完了: {len(unique)}件")
          PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/earnings.json
          git diff --staged --quiet || (git commit -m "chore: 決算データ更新 $(date +'%Y-%m-%d %H:%M JST')" && git push)
